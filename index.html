<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>고심 단골카드</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo",
        "Noto Sans KR", sans-serif;
      background: #f5f0e6;
      color: #19382f;
    }

    .wrap {
      min-height: 100vh;
      padding: 28px 18px 40px;
      display: flex;
      justify-content: center;
    }

    .container {
      width: 100%;
      max-width: 430px;
    }

    .hero {
      background: #123b32;
      color: #fffaf0;
      border-radius: 28px;
      padding: 34px 24px;
      margin-bottom: 18px;
      box-shadow: 0 14px 30px rgba(18, 59, 50, 0.18);
    }

    .brand {
      font-size: 13px;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      opacity: 0.85;
      margin-bottom: 22px;
    }

    h1 {
      font-size: 30px;
      line-height: 1.25;
      margin: 0 0 14px;
      font-weight: 700;
    }

    .subtitle {
      font-size: 16px;
      line-height: 1.65;
      opacity: 0.9;
      margin: 0;
    }

    .card {
      background: #fffdf7;
      border-radius: 24px;
      padding: 22px;
      margin-bottom: 16px;
      box-shadow: 0 8px 24px rgba(25, 56, 47, 0.08);
    }

    .section-title {
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 14px;
    }

    input {
      width: 100%;
      height: 52px;
      border: 1px solid #d8d0c2;
      border-radius: 16px;
      padding: 0 16px;
      font-size: 16px;
      margin-bottom: 10px;
      background: #fff;
      color: #19382f;
    }

    input::placeholder {
      color: #9b9388;
    }

    button {
      width: 100%;
      height: 54px;
      border: none;
      border-radius: 18px;
      background: #123b32;
      color: #fffaf0;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      margin-top: 6px;
    }

    .secondary-btn {
      background: #e8dfcf;
      color: #19382f;
    }

    .info {
      font-size: 17px;
      line-height: 1.6;
      margin: 8px 0 16px;
    }

    .stamp-count {
      font-size: 42px;
      font-weight: 800;
      color: #123b32;
      margin: 8px 0;
    }

    .small {
      font-size: 13px;
      color: #6d655d;
      line-height: 1.6;
      margin-top: 12px;
    }

    .instagram {
      display: block;
      text-align: center;
      text-decoration: none;
      background: #fffdf7;
      border: 1px solid #d8d0c2;
      color: #123b32;
      border-radius: 18px;
      padding: 16px;
      font-weight: 700;
      margin-top: 14px;
    }

    .footer {
      text-align: center;
      font-size: 12px;
      color: #81786e;
      margin-top: 22px;
      line-height: 1.6;
    }
.benefit-message {
  margin-top: 16px;
  padding: 16px;
  border-radius: 18px;
  background: #123b32;
  color: #fffaf0;
  font-size: 16px;
  line-height: 1.6;
  font-weight: 700;
  text-align: center;
}
   .secondary-btn {
  display: block;
  text-align: center;
  text-decoration: none;
} 
  </style>
</head>

<body>
  <div class="wrap">
    <main class="container">

      <section class="hero">
        <div class="brand">GOSIM SALON</div>
        <h1>사실,<br />저 고심 단골이예요.</h1>
        <p class="subtitle">
          자주 와주시는 분들께만 열어둔<br />
          작은 기록이에요.
        </p>
      </section>

      <section class="card">
        <div class="section-title">기록 시작하기</div>
        <input id="name" placeholder="이름 또는 닉네임" />
        <input id="phone" placeholder="휴대폰 뒷자리 4자리" maxlength="4" />
        <button onclick="saveUser()">고심 단골카드 만들기</button>
        <p class="small">
          앱 설치 없이 사용할 수 있어요.  
          입력한 기록은 현재 사용 중인 휴대폰 브라우저에 저장됩니다.
        </p>
      </section>

      <section class="card">
        <div class="section-title">내 단골 기록</div>
        <p id="info" class="info">아직 기록이 없어요.</p>
        <div id="visitCount" class="stamp-count">0</div>
        <p class="small">고심쌀롱 방문 기록</p>
       <p class="small">
QR을 찍을 때마다 방문 기록이 자동으로 쌓입니다.
</p>
     <div id="benefitMessage" class="benefit-message">
  기록이 쌓이면 혜택이 표시됩니다.
</div>
        <a class="secondary-btn" href="https://www.instagram.com/gosimsalon/" target="_blank">
  고심쌀롱 이야기 보기
</a>
      </section>

      <a class="instagram" href="https://www.instagram.com/gosimsalon/" target="_blank">
        Instagram 바로 보기 · @gosimsalon
      </a>

      <div class="footer">
        머물고 싶은 온도, 고심쌀롱<br />
        GOSIM SALON LOYALTY CARD
      </div>

    </main>
  </div>

 <script>
  let user = null;

  try {
    user = JSON.parse(localStorage.getItem("gosimUser"));
  } catch (e) {
    user = null;
  }

  function getToday() {
    return new Date().toISOString().slice(0, 10);
  }

 function getBenefitMessage(visits) {
  if (visits >= 10) {
    return "고심 고인물이 되셨습니다\n작은 선물이 준비되어 있습니다.";
  }

  if (visits >= 5) {
    return "당신은 진정한 단골입니다\n비밀 가격이 준비되어 있습니다.";
  }

  if (visits >= 3) {
    return "단골 커밍아웃\n주인장과 인사를 나누어주세요.";
  }

    return "조용히 쌓이는 고심쌀롱 방문 기록입니다.";
  }

  window.onload = function () {
    if (user) {
      const today = getToday();

      if (user.lastVisit !== today) {
        user.visits = (user.visits || 0) + 1;
        user.lastVisit = today;
        localStorage.setItem("gosimUser", JSON.stringify(user));
      }

      updateUI();
    }
  };

  function saveUser() {
    const name = document.getElementById("name").value.trim();
    const phone = document.getElementById("phone").value.trim();

    if (!name) {
      alert("이름을 입력해주세요.");
      return;
    }

    user = {
      name: name,
      phone: phone,
      visits: 1,
      lastVisit: getToday()
    };

    localStorage.setItem("gosimUser", JSON.stringify(user));
    updateUI();

    alert("고심 단골카드가 만들어졌어요.");
  }

  function updateUI() {
    const info = document.getElementById("info");
    const count = document.getElementById("visitCount");
    const benefit = document.getElementById("benefitMessage");

    if (!user) {
      info.innerText = "QR을 찍고 기록을 시작해보세요.";
      count.innerText = "0";
      if (benefit) {
        benefit.innerText = "첫 기록이 시작되면 방문 혜택이 표시됩니다.";
      }
      return;
    }

    const visits = user.visits || 0;

    info.innerText = user.name + "님의 방문 기록";
    count.innerText = visits;

    if (benefit) {
      benefit.innerText = getBenefitMessage(visits);
    }
  }

  function resetCard() {
    const ok = confirm("기록을 초기화할까요?");
    if (!ok) return;

    localStorage.removeItem("gosimUser");
    user = null;
    updateUI();
  }

  updateUI();
</script>
