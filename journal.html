<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>고심쌀롱 기록</title>

  <style>
    body {
      margin: 0;
      background: #f5f0e6;
      font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Noto Sans KR", sans-serif;
      color: #19382f;
    }

    .wrap {
      padding: 28px 18px 40px;
      max-width: 430px;
      margin: 0 auto;
    }

    .hero {
      background: #123b32;
      color: #fffaf0;
      border-radius: 28px;
      padding: 32px 24px;
      margin-bottom: 20px;
    }

    .hero h1 {
      font-size: 24px;
      line-height: 1.5;
      margin: 0;
    }

    .section {
      background: #fffdf7;
      border-radius: 20px;
      padding: 20px;
      margin-bottom: 16px;
    }

    .section-title {
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 10px;
    }

    .text {
      font-size: 15px;
      line-height: 1.6;
    }

    .image {
      width: 100%;
      height: 180px;
      border-radius: 16px;
      background: #ddd;
      margin-top: 10px;
    }

    .link-btn {
      display: block;
      margin-top: 16px;
      text-align: center;
      padding: 14px;
      border-radius: 16px;
      background: #123b32;
      color: #fffaf0;
      text-decoration: none;
      font-weight: 700;
    }
    .menu {
  display: flex;
  gap: 10px;
  margin-bottom: 16px;
}

.menu a {
  flex: 1;
  text-align: center;
  padding: 10px;
  border-radius: 14px;
  background: #fffdf7;
  text-decoration: none;
  color: #19382f;
  font-size: 14px;
  font-weight: 700;
}

html {
  scroll-behavior: smooth;
}
    .section {
  display: block;
  text-decoration: none;
  color: #19382f;
}

.image::after {
  content: "자세히 보기";
  display: flex;
  height: 100%;
  align-items: center;
  justify-content: center;
  color: #777;
  font-weight: 700;
}
  </style>
</head>

<body>
  <div class="wrap">

    <div class="hero">
      <h1>이 시간의 고심쌀롱</h1>
    </div>
    

   <a href="month.html" class="section">
  <div class="section-title">이달의 고심</div>
      <div class="text">
        바다 앞에서 조용히 머물 수 있는 시간.
        고심쌀롱은 그 시간을 준비합니다.
      </div>
      <div class="image"></div>
    </a>

   <a href="change.html" class="section">
  <div class="section-title">작은 변화</div>
  <div class="text">
    이번 달에는 새로운 디저트와 작은 우드 소품들이 들어왔습니다.
  </div>
  <div class="image"></div>
</a>

    <a href="regular.html" class="section">
  <div class="section-title">단골에게</div>
  <div class="text">
    자주 찾아주시는 분들께는 조용한 방식으로 작은 혜택을 준비하고 있습니다.
  </div>
</a>

    <a class="link-btn" href="index.html">
  단골 기록으로 돌아가기
</a>
  </div>
</body>
</html>
